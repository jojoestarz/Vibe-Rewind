<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promptlog — Session replay</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --panel: #1a1a1a;
      --border: #2a2a2a;
      --border-secondary: #333333;
      --text: #e8e6e3;
      --muted: #888780;
      --directive: #7f77dd;
      --refinement: #1d9e75;
      --pivot: #d85a30;
      --reversal: #d85a30;
      --scope_creep: #ba7517;
      --detail: #888780;
      --edge-stable: #1d9e75;
      --edge-mid: #d4a017;
      --edge-spike: #e85d5d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.25rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
    .app-header { margin-bottom: 1rem; }
    .header-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .header-row .titles { flex: 1 1 12rem; }
    .sub { color: var(--muted); font-size: 0.875rem; margin: 0.35rem 0 0; }
    .intent-line {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0.5rem 0 0;
      line-height: 1.4;
      max-width: 52rem;
      cursor: help;
    }
    .intent-line strong { color: var(--text); font-weight: 500; }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
    }
    .live-badge.live { color: var(--refinement); border-color: var(--refinement); }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .live-badge.live .live-dot { background: var(--refinement); box-shadow: 0 0 8px rgba(29, 158, 117, 0.5); }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.35rem; }
    .pick-row { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 0.75rem; max-width: 40rem; }
    .pick-row > div { flex: 1 1 12rem; }
    select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    select:focus {
      outline: none;
      border-color: var(--directive);
      box-shadow: 0 0 0 2px rgba(127, 119, 221, 0.25);
    }
    .constellation-wrap {
      overflow-x: auto;
      width: 100%;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }
    #constellationCanvas {
      display: block;
      height: 320px;
      cursor: crosshair;
    }
    .graph-tooltip {
      position: fixed;
      z-index: 50;
      max-width: 280px;
      padding: 0.5rem 0.65rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.75rem;
      line-height: 1.35;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    }
    .graph-tooltip .tt-type {
      display: inline-block;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .graph-tooltip .tt-preview { color: var(--muted); word-break: break-word; }
    .detail-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      min-height: 5rem;
    }
    .detail-placeholder {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    @media (max-width: 720px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
    .detail-col h3 { margin: 0 0 0.65rem; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .detail-head { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .prompt-text { font-size: 0.95rem; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    .meta { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; }
    .bar-wrap { height: 8px; background: var(--border); border-radius: 4px; margin-top: 0.5rem; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.15s ease; }
    .state-line { margin: 0.35rem 0; font-size: 0.9rem; }
    .state-label { color: var(--muted); display: inline-block; min-width: 7rem; }
    .drift-hot { color: #e85d5d; font-weight: 600; }
    .drift-warm { color: #d4a017; font-weight: 600; }
    .drift-cool { color: #1d9e75; font-weight: 600; }
    .drift-context { font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem; line-height: 1.35; }
    .decision-box {
      margin-top: 0.75rem;
      padding: 0.65rem 0.75rem;
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: 6px;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .tab-panel {
      height: 200px;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: lowercase;
      cursor: pointer;
      font-family: inherit;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--text);
      background: var(--border-secondary);
      border-bottom: 2px solid var(--directive);
      margin-bottom: -1px;
    }
    .tab-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.5rem 0.65rem;
    }
    .tab-body.hidden { display: none; }
    .tab-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
      padding: 0.45rem 0.5rem;
      margin: 0 -0.25rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .tab-row:hover { background: var(--border-secondary); }
    .tab-row.selected { background: var(--border-secondary); }
    .tab-row .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 0.3rem; flex-shrink: 0; }
    .tab-row .row-main { flex: 1; min-width: 0; }
    .tab-row .row-sub { color: var(--muted); font-size: 0.75rem; margin-top: 0.2rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.25rem; }
    .actions button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .actions button:hover { border-color: var(--directive); }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <div class="titles">
        <h1>Promptlog</h1>
        <p class="sub" id="headerSub">Review + QA — pick a project, then a session</p>
        <p class="intent-line" id="intentLine" title="" hidden><strong>Intent:</strong> <span id="intentText"></span></p>
      </div>
      <div class="live-badge" id="liveBadge" aria-live="polite">
        <span class="live-dot" aria-hidden="true"></span>
        <span id="liveBadgeText">demo mode</span>
      </div>
    </div>
    <div class="pick-row">
      <div>
        <label for="projectPick">Project</label>
        <select id="projectPick"></select>
      </div>
      <div>
        <label for="sessionPick">Session</label>
        <select id="sessionPick"></select>
      </div>
    </div>
  </header>

  <div class="constellation-wrap" id="constellationWrap">
    <canvas id="constellationCanvas" height="320" aria-label="Prompt constellation"></canvas>
  </div>
  <div id="graphTooltip" class="graph-tooltip" hidden></div>

  <div class="detail-panel" id="detailPanel">
    <p class="detail-placeholder" id="detailPlaceholder">Select a node to inspect</p>
    <div id="detailContent" class="detail-grid" style="display:none"></div>
  </div>

  <div class="tab-panel">
    <div class="tab-bar" role="tablist">
      <button type="button" class="tab active" role="tab" aria-selected="true" data-tab="decisions" id="tabBtnDecisions">decisions</button>
      <button type="button" class="tab" role="tab" aria-selected="false" data-tab="prompts" id="tabBtnPrompts">all prompts</button>
    </div>
    <div class="tab-body tab-decisions" id="tabDecisions" role="tabpanel"></div>
    <div class="tab-body tab-prompts hidden" id="tabPrompts" role="tabpanel" hidden></div>
  </div>

  <div class="actions">
    <button type="button" id="btnInfluential">most influential prompt ↗</button>
    <button type="button" id="btnDecisions">generate DECISIONS.md ↗</button>
    <button type="button" id="btnDrift">find drift point ↗</button>
  </div>

  <script>
    const TYPE_COLORS = {
      directive: '#7F77DD',
      refinement: '#1D9E75',
      pivot: '#D85A30',
      reversal: '#D85A30',
      scope_creep: '#BA7517',
      detail: '#888780',
    };

    const SEED_PROJECT = {
      id: 'demo-project-001',
      repo_path: '/projects/my-app',
      intent_text:
        'Build a real-time dashboard for tracking Cursor agent sessions with replay, drift visibility, and decision traceability.',
      session_count: 1,
      last_started_at: Date.now() - 100000,
    };

    const SEED_SESSION = {
      session: {
        id: 'demo-session-a3f9',
        project_id: SEED_PROJECT.id,
        display_title: 'dashboard build · 3 Apr · 14:32 · 8 prompts',
        started_at: Date.now() - 2200000,
        ended_at: Date.now() - 100000,
        repo: '/projects/my-app',
        prompt_count: 8,
        project_intent: SEED_PROJECT.intent_text,
        project_repo_path: SEED_PROJECT.repo_path,
        first_prompt_text:
          'build me a dashboard for tracking cursor agent sessions',
      },
      prompts: [
        { id:1, session_id:'demo-session-a3f9', seq:1, text:'"build me a dashboard for tracking cursor agent sessions"', timestamp: Date.now()-2200000, type:'directive', influence:91, drift:12, spec_coverage:22, decision:'Dashboard for agent sessions established as the top-level product goal.' },
        { id:2, session_id:'demo-session-a3f9', seq:2, text:'"make it show the files that were changed"', timestamp: Date.now()-1900000, type:'refinement', influence:44, drift:18, spec_coverage:35, decision:'File diff view added as a core feature.' },
        { id:3, session_id:'demo-session-a3f9', seq:3, text:'"actually can you add a graph like the one we saw earlier"', timestamp: Date.now()-1600000, type:'pivot', influence:78, drift:41, spec_coverage:31, decision:'Graph-based view replaces tabular layout; dashboard framing partially abandoned.' },
        { id:4, session_id:'demo-session-a3f9', seq:4, text:'"make the nodes draggable"', timestamp: Date.now()-1400000, type:'detail', influence:29, drift:44, spec_coverage:36, decision:'None.' },
        { id:5, session_id:'demo-session-a3f9', seq:5, text:'"add colour coding for different decision types"', timestamp: Date.now()-1100000, type:'refinement', influence:52, drift:47, spec_coverage:44, decision:'Type-based colour system introduced.' },
        { id:6, session_id:'demo-session-a3f9', seq:6, text:'"hmm can we also track which cursorrules triggered each one"', timestamp: Date.now()-800000, type:'scope_creep', influence:83, drift:68, spec_coverage:40, decision:'Rules-tracing subsystem scoped in — new feature not in original intent.' },
        { id:7, session_id:'demo-session-a3f9', seq:7, text:'"nevermind the rules thing, just show the prompt that caused each decision"', timestamp: Date.now()-500000, type:'reversal', influence:95, drift:52, spec_coverage:55, decision:'Rules-tracing killed. Prompt-to-decision linking introduced as the core concept.' },
        { id:8, session_id:'demo-session-a3f9', seq:8, text:'"add a scrubber so we can replay the session from any point"', timestamp: Date.now()-200000, type:'directive', influence:71, drift:48, spec_coverage:78, decision:'Scrubber/replay metaphor established as the primary UX. Product identity crystallised.' },
      ],
      project: {
        id: SEED_PROJECT.id,
        intent_text: SEED_PROJECT.intent_text,
        repo_path: SEED_PROJECT.repo_path,
      },
    };

    const skipWords = new Set(['a', 'the', 'an', 'can', 'you', 'please', 'just']);

    function formatSessionStart(ms) {
      const d = new Date(ms);
      const day = d.getDate();
      const mon = d.toLocaleString('en-GB', { month: 'short' });
      const hm = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
      return `${day} ${mon} · ${hm}`;
    }

    function tokenizeForName(text) {
      return String(text || '')
        .toLowerCase()
        .split(/[\s.,;:!?'"()[\]{}–—-]+/)
        .filter(Boolean);
    }

    function twoWordName(firstPromptText) {
      const tokens = tokenizeForName(firstPromptText).filter((w) => !skipWords.has(w));
      if (tokens.length === 0) return 'session';
      if (tokens.length === 1) return tokens[0];
      return `${tokens[0]} ${tokens[1]}`;
    }

    function sessionDisplayLabel(session, firstPromptText) {
      if (session.display_title) return session.display_title;
      const name = twoWordName(firstPromptText ?? session.first_prompt_text ?? '');
      const date = formatSessionStart(session.started_at);
      const n = session.prompt_count ?? '?';
      return `${name} · ${date} · ${n} prompts`;
    }

    function projectDisplayLabel(p) {
      const path = p.repo_path || p.id || 'project';
      const short = path.replace(/^.*\//, '') || path;
      return short + (p.session_count != null ? ` · ${p.session_count} sessions` : '');
    }

    function typeColor(t) {
      return TYPE_COLORS[t] || TYPE_COLORS.detail;
    }

    function hexToRgba(hex, a) {
      const x = hex.replace('#', '');
      const r = parseInt(x.slice(0, 2), 16);
      const g = parseInt(x.slice(2, 4), 16);
      const b = parseInt(x.slice(4, 6), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function edgeColorForDelta(delta) {
      const d = Math.abs(delta);
      if (d < 12) return getComputedStyle(document.documentElement).getPropertyValue('--edge-stable').trim() || '#1d9e75';
      if (d < 32) return getComputedStyle(document.documentElement).getPropertyValue('--edge-mid').trim() || '#d4a017';
      return getComputedStyle(document.documentElement).getPropertyValue('--edge-spike').trim() || '#e85d5d';
    }

    function influenceBarColor(v) {
      if (v >= 80) return '#7F77DD';
      if (v >= 50) return '#1D9E75';
      if (v >= 30) return '#BA7517';
      return '#888780';
    }

    function scopeForType(t) {
      if (t === 'directive') return 'broad';
      if (t === 'scope_creep' || t === 'pivot') return 'expanding';
      return 'narrow';
    }

    function pivotRisk(drift) {
      if (drift >= 60) return 'high';
      if (drift >= 40) return 'medium';
      return 'low';
    }

    function driftClass(d) {
      if (d >= 60) return 'drift-hot';
      if (d >= 40) return 'drift-warm';
      return 'drift-cool';
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function truncateIntent(s, max) {
      const m = max ?? 48;
      if (!s) return '';
      const one = s.replace(/\s+/g, ' ').trim();
      if (one.length <= m) return one;
      return one.slice(0, m) + '…';
    }

    function labelTimeForNode(promptTs, anchorMs) {
      const p = new Date(promptTs);
      const a = new Date(anchorMs);
      const sameDay =
        p.getFullYear() === a.getFullYear() &&
        p.getMonth() === a.getMonth() &&
        p.getDate() === a.getDate();
      if (sameDay) {
        return p.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
      }
      const d = p.getDate();
      const mon = p.toLocaleString('en-GB', { month: 'short' });
      const hm = p.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
      return `${d} ${mon} ${hm}`;
    }

    let projectsList = [];
    let sessionsList = [];
    let currentProject = null;
    let currentSessionRow = null;
    let currentSessionId = null;
    let currentProjectIntent = '';
    let currentSessionBundle = null;
    let prompts = [];
    let selectedIndex = null;
    let hoveredIndex = null;
    let useSeed = false;
    let layoutNodes = [];
    let canvasCssWidth = 400;
    let hoverRaf = null;
    let hoverAnimStart = 0;
    let mainRaf = null;
    let pathAnim = null;
    let pathAnimDone = false;
    let burstParticles = [];
    let lastBurstAt = 0;

    const projectPick = document.getElementById('projectPick');
    const sessionPick = document.getElementById('sessionPick');
    const constellationWrap = document.getElementById('constellationWrap');
    const canvas = document.getElementById('constellationCanvas');
    const ctx = canvas.getContext('2d');
    const graphTooltip = document.getElementById('graphTooltip');
    const detailPlaceholder = document.getElementById('detailPlaceholder');
    const detailContent = document.getElementById('detailContent');
    const tabDecisions = document.getElementById('tabDecisions');
    const tabPrompts = document.getElementById('tabPrompts');
    const liveBadge = document.getElementById('liveBadge');
    const liveBadgeText = document.getElementById('liveBadgeText');
    const headerSub = document.getElementById('headerSub');
    const intentLine = document.getElementById('intentLine');
    const intentText = document.getElementById('intentText');

    function setIntentHeader(text) {
      const t = String(text || '').trim();
      currentProjectIntent = t;
      if (!t) {
        intentLine.hidden = true;
        return;
      }
      intentLine.hidden = false;
      intentLine.title = t;
      intentText.textContent = truncateIntent(t, 120);
    }

    function sessionAnchorMs() {
      if (!prompts.length) return currentSessionRow?.started_at ?? Date.now();
      const first = prompts[0];
      return first?.timestamp ?? currentSessionRow?.started_at ?? Date.now();
    }

    function computeLayout() {
      const n = prompts.length;
      const w = canvasCssWidth;
      layoutNodes = [];
      if (!n) return;
      for (let i = 0; i < n; i++) {
        const p = prompts[i];
        const inf = Math.min(100, Math.max(0, p.influence ?? 0));
        const x = n === 1 ? w / 2 : 40 + (i / (n - 1)) * (w - 80);
        const y = 260 - (inf / 100) * 200;
        const r = 10 + inf / 10;
        layoutNodes.push({ x, y, r, prompt: p, index: i });
      }
    }

    function resizeCanvas() {
      const n = prompts.length;
      const containerW = constellationWrap.clientWidth || 400;
      canvasCssWidth = Math.max(containerW, 90 * Math.max(n, 8));
      const cssH = 320;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(canvasCssWidth * dpr);
      canvas.height = Math.round(cssH * dpr);
      canvas.style.width = canvasCssWidth + 'px';
      canvas.style.height = cssH + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      computeLayout();
      startPathLoadAnim();
      scheduleMainDraw();
    }

    function startPathLoadAnim() {
      pathAnimDone = false;
      if (prompts.length < 2) {
        pathAnim = null;
        pathAnimDone = true;
        return;
      }
      pathAnim = { edgeIdx: 0, t: 0, lastTs: performance.now() };
    }

    function spawnBurst(x, y, colorHex) {
      const n = 9;
      burstParticles = [];
      for (let i = 0; i < n; i++) {
        const ang = (Math.PI * 2 * i) / n + Math.random() * 0.4;
        const sp = 1.2 + Math.random() * 1.8;
        burstParticles.push({
          x,
          y,
          vx: Math.cos(ang) * sp,
          vy: Math.sin(ang) * sp,
          life: 1,
          color: colorHex,
        });
      }
      lastBurstAt = performance.now();
    }

    function drawConstellation() {
      const w = canvasCssWidth;
      const h = 320;
      const now = performance.now();
      ctx.clearRect(0, 0, w, h);
      const nodes = layoutNodes;
      if (!nodes.length) return;

      const sel = selectedIndex;
      const atRest = pathAnimDone && burstParticles.length === 0;

      for (let i = 0; i < nodes.length - 1; i++) {
        const a = nodes[i];
        const b = nodes[i + 1];
        const d0 = a.prompt.drift ?? 0;
        const d1 = b.prompt.drift ?? 0;
        const ec = edgeColorForDelta(d1 - d0);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = hexToRgba(ec, 0.55);
        ctx.lineWidth = 2;
        ctx.stroke();

        if (pathAnim && pathAnim.edgeIdx === i) {
          const t = pathAnim.t;
          const cx = a.x + (b.x - a.x) * t;
          const cy = a.y + (b.y - a.y) * t;
          ctx.beginPath();
          ctx.arc(cx, cy, 6, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.globalAlpha = 0.95;
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.beginPath();
          ctx.arc(cx, cy, 10, 0, Math.PI * 2);
          ctx.strokeStyle = hexToRgba(ec, 0.8);
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }

      const anchor = sessionAnchorMs();
      ctx.font = '10px ui-sans-serif, system-ui, sans-serif';
      ctx.textAlign = 'center';

      for (let i = 0; i < nodes.length; i++) {
        const { x, y, r, prompt: p } = nodes[i];
        const col = typeColor(p.type);
        const isHover = hoveredIndex === i;
        const pulse = atRest ? 0.65 + 0.22 * Math.sin(now / 950 + i * 0.85) : 1;
        let fillA = (isHover ? 0.55 : 0.32) * pulse;
        if (sel === i) fillA = Math.min(0.85, fillA + 0.2);
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = hexToRgba(col, fillA);
        ctx.fill();
        ctx.strokeStyle = col;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = col;
        ctx.fill();

        const ts = p.timestamp ?? anchor;
        ctx.fillStyle = '#888780';
        ctx.fillText(labelTimeForNode(ts, anchor), x, y + r + 14);
      }

      if (hoveredIndex != null && nodes[hoveredIndex]) {
        const { x, y, r } = nodes[hoveredIndex];
        const t = ((performance.now() - hoverAnimStart) % 300) / 300;
        const ringR = r + t * 16;
        const alpha = 1 - t;
        ctx.beginPath();
        ctx.arc(x, y, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = hexToRgba(typeColor(nodes[hoveredIndex].prompt.type), 0.35 * alpha);
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      if (sel != null && nodes[sel]) {
        const { x, y, r } = nodes[sel];
        ctx.beginPath();
        ctx.arc(x, y, r + 6, 0, Math.PI * 2);
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#e8e6e3';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      if (sel != null && nodes[sel]) {
        const nx = nodes[sel].x;
        ctx.save();
        ctx.setLineDash([4, 6]);
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border').trim() || '#2a2a2a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(nx, 0);
        ctx.lineTo(nx, h);
        ctx.stroke();
        ctx.restore();
      }

      for (const pt of burstParticles) {
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = hexToRgba(pt.color, pt.life * 0.9);
        ctx.fill();
      }
    }

    function tickAnim() {
      const now = performance.now();
      if (pathAnim && layoutNodes.length > 1) {
        const dt = Math.min(0.05, (now - pathAnim.lastTs) / 1000);
        pathAnim.lastTs = now;
        pathAnim.t += dt * 1.15;
        if (pathAnim.t >= 1) {
          pathAnim.t = 0;
          pathAnim.edgeIdx += 1;
          if (pathAnim.edgeIdx >= layoutNodes.length - 1) {
            pathAnim = null;
            pathAnimDone = true;
          }
        }
      } else if (!pathAnim && !pathAnimDone && prompts.length >= 2) {
        pathAnimDone = true;
      }

      if (burstParticles.length) {
        for (const pt of burstParticles) {
          pt.x += pt.vx;
          pt.y += pt.vy;
          pt.life -= 0.04;
          pt.vx *= 0.96;
          pt.vy *= 0.96;
        }
        burstParticles = burstParticles.filter((p) => p.life > 0);
      }

      drawConstellation();

      if (
        pathAnim ||
        burstParticles.length ||
        hoveredIndex != null ||
        !pathAnimDone
      ) {
        mainRaf = requestAnimationFrame(tickAnim);
      } else {
        mainRaf = null;
      }
    }

    function scheduleMainDraw() {
      drawConstellation();
      if (mainRaf != null) return;
      if (
        pathAnim ||
        burstParticles.length ||
        hoveredIndex != null ||
        !pathAnimDone
      ) {
        mainRaf = requestAnimationFrame(tickAnim);
      }
    }

    function scheduleHoverDraw() {
      if (hoverRaf != null) cancelAnimationFrame(hoverRaf);
      hoverRaf = null;
      if (hoveredIndex == null) {
        scheduleMainDraw();
        return;
      }
      hoverAnimStart = performance.now();
      function loop() {
        scheduleMainDraw();
        if (hoveredIndex != null) hoverRaf = requestAnimationFrame(loop);
        else hoverRaf = null;
      }
      hoverRaf = requestAnimationFrame(loop);
    }

    function hitTest(mx, my) {
      for (let i = layoutNodes.length - 1; i >= 0; i--) {
        const { x, y, r } = layoutNodes[i];
        const dx = mx - x;
        const dy = my - y;
        if (dx * dx + dy * dy <= (r + 8) * (r + 8)) return i;
      }
      return null;
    }

    function updateTooltip(idx, clientX, clientY) {
      if (idx == null || !layoutNodes[idx]) {
        graphTooltip.hidden = true;
        return;
      }
      const p = layoutNodes[idx].prompt;
      const preview = String(p.text || '').slice(0, 60) + (String(p.text || '').length > 60 ? '…' : '');
      graphTooltip.innerHTML =
        `<span class="tt-type" style="color:${typeColor(p.type)}">${escapeHtml(p.type || '—')}</span><br/><span class="tt-preview">${escapeHtml(preview)}</span>`;
      graphTooltip.hidden = false;
      const rect = graphTooltip.getBoundingClientRect();
      let left = clientX - rect.width / 2;
      let top = clientY - rect.height - 12;
      left = Math.max(8, Math.min(window.innerWidth - rect.width - 8, left));
      top = Math.max(8, top);
      graphTooltip.style.left = left + 'px';
      graphTooltip.style.top = top + 'px';
    }

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const idx = hitTest(mx, my);
      if (idx !== hoveredIndex) {
        hoveredIndex = idx;
        scheduleHoverDraw();
      }
      updateTooltip(idx, e.clientX, e.clientY);
    });

    canvas.addEventListener('mouseleave', () => {
      hoveredIndex = null;
      if (hoverRaf != null) cancelAnimationFrame(hoverRaf);
      hoverRaf = null;
      graphTooltip.hidden = true;
      scheduleMainDraw();
    });

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const idx = hitTest(mx, my);
      if (idx != null) {
        const node = layoutNodes[idx];
        spawnBurst(node.x, node.y, typeColor(node.prompt.type));
        setSelectedIndex(idx, true);
      }
    });

    function scrollCanvasToIndex(i) {
      if (i == null || !layoutNodes[i]) return;
      const wrap = constellationWrap;
      const nodeX = layoutNodes[i].x;
      const vw = wrap.clientWidth;
      const target = nodeX - vw / 2;
      wrap.scrollLeft = Math.max(0, Math.min(wrap.scrollWidth - vw, target));
    }

    function currentSessionLabel() {
      if (!currentSessionRow) return '';
      const ftp = currentSessionRow.first_prompt_text ?? prompts[0]?.text ?? '';
      return sessionDisplayLabel(currentSessionRow, ftp);
    }

    function setSelectedIndex(i, fromCanvasClick) {
      if (!prompts.length) return;
      selectedIndex = Math.max(0, Math.min(prompts.length - 1, i));
      scrollCanvasToIndex(selectedIndex);
      if (!fromCanvasClick && layoutNodes[selectedIndex]) {
        const n = layoutNodes[selectedIndex];
        spawnBurst(n.x, n.y, typeColor(n.prompt.type));
      }
      scheduleMainDraw();
      renderDetail();
      renderTabs();
      headerSub.textContent = currentSessionLabel();
    }

    function renderDetail() {
      if (selectedIndex == null || !prompts[selectedIndex]) {
        detailPlaceholder.style.display = 'block';
        detailContent.style.display = 'none';
        detailContent.innerHTML = '';
        return;
      }
      detailPlaceholder.style.display = 'none';
      detailContent.style.display = 'grid';
      const p = prompts[selectedIndex];
      const inf = p.influence ?? 0;
      const barW = Math.min(100, Math.max(0, inf));
      const d = p.drift ?? 0;
      const sc = p.spec_coverage ?? 0;
      const pr = pivotRisk(d);
      const intentSrc = currentProjectIntent || '';
      const intentShort = truncateIntent(intentSrc, 42);

      detailContent.innerHTML = `
        <div class="detail-col">
          <h3>Prompt</h3>
          <div class="detail-head">${escapeHtml(currentSessionLabel())} · P${p.seq}</div>
          <span class="badge" style="background:${typeColor(p.type)}22;color:${typeColor(p.type)}">${escapeHtml(p.type || '—')}</span>
          <div class="prompt-text">${escapeHtml(String(p.text))}</div>
          <div class="meta">${p.timestamp ? escapeHtml(new Date(p.timestamp).toLocaleString()) : ''}</div>
        </div>
        <div class="detail-col">
          <h3>Scores</h3>
          <div class="state-line"><span class="state-label">Influence</span> <strong>${inf}%</strong></div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${barW}%;background:${influenceBarColor(inf)}"></div></div>
          <div class="state-line"><span class="state-label">Vibe drift</span> <span class="${driftClass(d)}">${d}%</span></div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${d}%;background:${d >= 60 ? '#e85d5d' : d >= 40 ? '#d4a017' : '#1d9e75'}"></div></div>
          <p class="drift-context">Drifted ${d}% from: &lsquo;${escapeHtml(intentShort)}&rsquo;</p>
          <div class="state-line"><span class="state-label">Scope</span> ${escapeHtml(scopeForType(p.type))}</div>
          <div class="state-line"><span class="state-label">Spec coverage</span> ${sc}%</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${sc}%;background:#1d9e75"></div></div>
          <div class="state-line"><span class="state-label">Pivot risk</span> ${escapeHtml(pr)}</div>
          <div class="decision-box" style="border-left-color:${typeColor(p.type)}">${escapeHtml(String(p.decision || '—'))}</div>
        </div>
      `;
    }

    function renderTabs() {
      const selSeq = selectedIndex != null ? prompts[selectedIndex]?.seq : null;
      tabDecisions.innerHTML = '';
      const decisions = prompts.filter((p) => (p.influence ?? 0) >= 40);
      decisions.forEach((p) => {
        const idx = prompts.indexOf(p);
        const row = document.createElement('div');
        row.className = 'tab-row' + (p.seq === selSeq ? ' selected' : '');
        row.dataset.index = String(idx);
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.background = typeColor(p.type);
        const main = document.createElement('div');
        main.className = 'row-main';
        main.innerHTML = `<strong>P${p.seq} · ${escapeHtml(p.type || '—')} · ${p.influence ?? 0}%</strong><div class="row-sub">${escapeHtml(String(p.decision || '—'))}</div>`;
        row.appendChild(dot);
        row.appendChild(main);
        row.addEventListener('click', () => setSelectedIndex(idx));
        tabDecisions.appendChild(row);
      });

      tabPrompts.innerHTML = '';
      prompts.forEach((p, idx) => {
        const row = document.createElement('div');
        row.className = 'tab-row' + (p.seq === selSeq ? ' selected' : '');
        const preview = String(p.text || '').slice(0, 80) + (String(p.text || '').length > 80 ? '…' : '');
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.background = typeColor(p.type);
        const main = document.createElement('div');
        main.className = 'row-main';
        const ts = p.timestamp ? new Date(p.timestamp).toLocaleString() : '—';
        main.innerHTML = `<strong>P${p.seq}</strong> <span class="badge" style="font-size:0.65rem;padding:0.1rem 0.35rem;background:${typeColor(p.type)}22;color:${typeColor(p.type)}">${escapeHtml(p.type || '—')}</span><div class="row-sub">${escapeHtml(ts)} — ${escapeHtml(preview)}</div>`;
        row.appendChild(dot);
        row.appendChild(main);
        row.addEventListener('click', () => setSelectedIndex(idx));
        tabPrompts.appendChild(row);
      });
    }

    document.querySelectorAll('.tab-bar .tab').forEach((btn) => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-bar .tab').forEach((b) => {
          b.classList.toggle('active', b === btn);
          b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
        });
        const showDec = tab === 'decisions';
        tabDecisions.classList.toggle('hidden', !showDec);
        tabDecisions.hidden = !showDec;
        tabPrompts.classList.toggle('hidden', showDec);
        tabPrompts.hidden = showDec;
      });
    });

    async function loadProjectsAndSessions() {
      useSeed = false;
      liveBadge.classList.remove('live');
      liveBadgeText.textContent = 'demo mode';
      projectsList = [];
      sessionsList = [];

      try {
        const h = await fetch('/api/health');
        if (!h.ok) throw new Error('health');
        const pr = await fetch('/api/projects');
        if (!pr.ok) throw new Error('projects');
        projectsList = await pr.json();
        if (!Array.isArray(projectsList)) throw new Error('shape');
        liveBadge.classList.add('live');
        liveBadgeText.textContent = 'live';
      } catch {
        useSeed = true;
        projectsList = [SEED_PROJECT];
      }

      projectPick.innerHTML = '';
      projectsList.forEach((p) => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = projectDisplayLabel(p);
        projectPick.appendChild(opt);
      });

      if (!projectsList.length) {
        sessionPick.innerHTML = '';
        setIntentHeader('');
        return;
      }

      projectPick.value = projectsList[0].id;
      await onProjectChange();
    }

    async function onProjectChange() {
      const pid = projectPick.value;
      currentProject = projectsList.find((p) => p.id === pid) || null;
      const intentFromList = currentProject?.intent_text ?? '';
      setIntentHeader(intentFromList);

      if (useSeed && pid === SEED_PROJECT.id) {
        sessionsList = [SEED_SESSION.session];
      } else {
        try {
          const r = await fetch('/api/projects/' + encodeURIComponent(pid) + '/sessions');
          if (!r.ok) throw new Error('bad');
          sessionsList = await r.json();
        } catch {
          sessionsList = [];
        }
      }

      sessionPick.innerHTML = '';
      sessionsList.forEach((s) => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = sessionDisplayLabel(s, s.first_prompt_text);
        sessionPick.appendChild(opt);
      });

      if (sessionsList.length) {
        sessionPick.value = sessionsList[0].id;
        await loadSessionData(sessionPick.value);
      } else {
        currentSessionRow = null;
        currentSessionId = null;
        prompts = [];
        selectedIndex = null;
        detailPlaceholder.style.display = 'block';
        detailContent.style.display = 'none';
        resizeCanvas();
        renderTabs();
      }
    }

    async function loadSessionData(id) {
      currentSessionId = id;
      currentSessionRow = sessionsList.find((s) => s.id === id) || null;
      selectedIndex = null;
      currentSessionBundle = null;
      pathAnimDone = false;

      if (useSeed && id === SEED_SESSION.session.id) {
        prompts = [...SEED_SESSION.prompts].sort((a, b) => a.seq - b.seq);
        currentSessionRow = SEED_SESSION.session;
        currentSessionBundle = SEED_SESSION;
        setIntentHeader(SEED_SESSION.project?.intent_text ?? currentProjectIntent);
      } else {
        try {
          const r = await fetch('/api/session/' + encodeURIComponent(id));
          if (!r.ok) throw new Error('bad');
          const data = await r.json();
          prompts = (data.prompts || []).slice().sort((a, b) => a.seq - b.seq);
          if (data.session) currentSessionRow = data.session;
          currentSessionBundle = data;
          if (data.project?.intent_text) {
            setIntentHeader(data.project.intent_text);
          }
        } catch {
          prompts = [];
        }
      }

      detailPlaceholder.style.display = 'block';
      detailContent.style.display = 'none';
      detailContent.innerHTML = '';
      headerSub.textContent = currentSessionRow
        ? sessionDisplayLabel(currentSessionRow, currentSessionRow.first_prompt_text ?? prompts[0]?.text)
        : 'Review + QA — pick a session';
      resizeCanvas();
      renderTabs();
      scheduleMainDraw();
    }

    projectPick.addEventListener('change', () => {
      onProjectChange();
    });

    sessionPick.addEventListener('change', () => {
      loadSessionData(sessionPick.value);
    });

    window.addEventListener('resize', () => {
      resizeCanvas();
    });

    if (window.matchMedia) {
      const mq = window.matchMedia('(resolution: 1dppx)');
      mq.addEventListener?.('change', () => resizeCanvas());
    }

    function sendPrompt(text) {
      if (typeof window.sendPrompt === 'function') {
        window.sendPrompt(text);
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard (sendPrompt not available):\n' + text);
      }).catch(() => {
        prompt('Copy:', text);
      });
    }

    document.getElementById('btnInfluential').onclick = () => {
      if (!prompts.length) return;
      let best = 0;
      prompts.forEach((p, i) => {
        if ((p.influence ?? 0) > (prompts[best].influence ?? 0)) best = i;
      });
      setSelectedIndex(best);
      sendPrompt('what was the most influential prompt in this session and why?');
    };
    document.getElementById('btnDecisions').onclick = () => {
      sendPrompt('generate a DECISIONS.md from this session replay');
    };
    document.getElementById('btnDrift').onclick = () => {
      if (!prompts.length) return;
      let best = 0;
      let maxD = -1;
      prompts.forEach((p, i) => {
        const d = p.drift ?? 0;
        if (d > maxD) {
          maxD = d;
          best = i;
        }
      });
      setSelectedIndex(best);
      sendPrompt('where did this session start to drift from the original spec?');
    };

    loadProjectsAndSessions();
  </script>
</body>
</html>
